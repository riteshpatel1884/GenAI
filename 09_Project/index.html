<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <h2>📚 RAG Chat</h2>

        <button class="new-chat">
            + New Chat
        </button>

        <div class="history">
            <div class="history-item">Deep Learning</div>
            <div class="history-item">Word2Vec</div>
            <div class="history-item">CNN Notes</div>
        </div>
    </div>

    <div class="chat-section">

        <div class="topbar">
            <h3>Deep Learning Assistant</h3>
        </div>

        <div class="chat-area" id="chat">

            <div class="bot-message">
                👋 Ask anything from your uploaded PDF.
            </div>

        </div>

        <div class="input-area">

            <textarea
                id="question"
                placeholder="Ask about your document..."
            ></textarea>

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
