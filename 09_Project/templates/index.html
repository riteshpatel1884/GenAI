<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Learning Reading Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#0a0a0a;
    --line:#e4e4e4;
    --line-strong:#0a0a0a;
    --text-dim:#6b6b6b;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }

  .page{
    display:flex;
    flex-direction:column;
    max-width:760px;
    width:100%;
    min-width:0;
  }

  .page-header{
    padding:36px 32px 20px;
    border-bottom:1px solid var(--line-strong);
  }
  .page-header h1{
    font-family:'Lora',serif;
    font-weight:600;
    font-size:22px;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  .page-header p{
    margin:0;
    font-size:13px;
    color:var(--text-dim);
  }

  .thread{
    flex:1;
    overflow-y:auto;
    padding:28px 32px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  .msg{
    max-width:80%;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .msg.user{align-self:flex-end;}
  .msg.ai{align-self:flex-start;}

  .msg-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  .msg.user .msg-label{text-align:right;}

  .bubble{
    padding:14px 18px;
    font-size:14.5px;
    line-height:1.6;
    white-space:pre-wrap;
  }

  .msg.user .bubble{
    background:var(--ink);
    color:#ffffff;
    border-radius:2px 2px 0 2px;
  }

  .msg.ai .bubble{
    background:#ffffff;
    color:var(--ink);
    font-family:'Lora',serif;
    font-size:15px;
    border:1px solid var(--line-strong);
    border-radius:0 2px 2px 2px;
  }

  .footnote{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    padding-top:2px;
  }

  .thinking{
    align-self:flex-start;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--text-dim);
    padding-left:2px;
  }
  .thinking .dots span{
    animation:blink 1.4s infinite;
    opacity:0.2;
  }
  .thinking .dots span:nth-child(2){animation-delay:0.2s;}
  .thinking .dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{ 0%,80%,100%{opacity:0.2;} 40%{opacity:1;} }

  /* ---------- Composer ---------- */
  .composer{
    padding:18px 32px 30px;
    border-top:1px solid var(--line-strong);
    display:flex;
    gap:10px;
  }
  .composer input{
    flex:1;
    background:#ffffff;
    border:1px solid var(--line-strong);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:13px 16px;
    border-radius:2px;
    outline:none;
  }
  .composer input:focus{box-shadow:0 0 0 1px var(--ink);}
  .composer input::placeholder{color:#a3a3a3;}

  .composer button{
    background:var(--ink);
    color:#ffffff;
    border:1px solid var(--ink);
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    font-weight:500;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:0 22px;
    border-radius:2px;
    cursor:pointer;
    transition:opacity 0.15s ease;
  }
  .composer button:hover{opacity:0.75;}
  .composer button:disabled{opacity:0.35;cursor:not-allowed;}

  .empty-state{
    margin:auto;
    text-align:center;
    color:var(--text-dim);
    font-family:'Lora',serif;
    font-style:italic;
    font-size:14px;
    max-width:340px;
    line-height:1.6;
  }

  .thread::-webkit-scrollbar{width:8px;}
  .thread::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  @media (max-width:720px){
    .page-header,.thread,.composer{padding-left:18px;padding-right:18px;}
  }
</style>
</head>
<body>

  <main class="page">
    <div class="page-header">
      <h1>Booknotes AI</h1>
      <p>Answers are grounded only in the retrieved pages.</p>
    </div>

    <div class="thread" id="thread">
      <div class="empty-state" id="emptyState">
        Nothing asked yet.<br>Try — "what is the word2vec framework?"
      </div>
    </div>

    <form class="composer" id="composer" autocomplete="off">
      <input type="text" id="queryInput" placeholder="Ask the book something…" />
      <button type="submit" id="sendBtn">Ask</button>
    </form>
  </main>

<script>
  const thread = document.getElementById('thread');
  const emptyState = document.getElementById('emptyState');
  const composer = document.getElementById('composer');
  const input = document.getElementById('queryInput');
  const sendBtn = document.getElementById('sendBtn');

  function addMessage(role, text, pages){
    if(emptyState) emptyState.remove();

    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'you' : 'AI';
    wrap.appendChild(label);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);

    if(role === 'ai' && pages && pages.length){
      const fn = document.createElement('div');
      fn.className = 'footnote';
      fn.textContent = 'pp. ' + pages.map(p => p + 1).join(', ');
      wrap.appendChild(fn);
    }

    thread.appendChild(wrap);
    thread.scrollTop = thread.scrollHeight;
    return wrap;
  }

  function addThinking(){
    const el = document.createElement('div');
    el.className = 'thinking';
    el.id = 'thinkingIndicator';
    el.innerHTML = 'turning pages<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
    thread.appendChild(el);
    thread.scrollTop = thread.scrollHeight;
  }
  function removeThinking(){
    const el = document.getElementById('thinkingIndicator');
    if(el) el.remove();
  }

  composer.addEventListener('submit', async (e) => {
    e.preventDefault();
    const query = input.value.trim();
    if(!query) return;

    addMessage('user', query);
    input.value = '';
    sendBtn.disabled = true;
    addThinking();

    try{
      const res = await fetch('/chat', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({query})
      });
      const data = await res.json();
      removeThinking();

      if(!res.ok){
        addMessage('ai', data.error || 'Something went wrong reading the document.');
      } else {
        addMessage('ai', data.answer, data.pages);
      }
    }catch(err){
      removeThinking();
      addMessage('ai', 'Could not reach the backend. Is app.py running?');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
